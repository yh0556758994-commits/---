<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProBank v9.4 - Smart Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Assistant', sans-serif; background: var(--bg); color: #334155; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 30px 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
        .sidebar h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }
        .nav-btn { background: rgba(255,255,255,0.05); border: none; color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; text-align: right; font-size: 0.95rem; transition: 0.3s; width: 100%; }
        .nav-btn:hover { background: var(--accent); }
        .archive-list { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; flex-grow: 1; overflow-y: auto; }
        .archive-item { font-size: 0.85rem; padding: 8px; border-radius: 8px; display: flex; justify-content: space-between; margin-bottom: 5px; background: rgba(255,255,255,0.03); }
        
        .main { flex: 1; overflow-y: auto; padding: 30px; display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow); }
        .progress-container { background:#e2e8f0; height:12px; border-radius:50px; overflow:hidden; margin:10px 0; }
        #progressFill { height:100%; width:0%; transition: 0.8s ease-in-out; }

        .balance-float { position: fixed; bottom: 30px; left: 30px; background: var(--accent); color: white; padding: 15px 30px; border-radius: 100px; font-weight: 800; font-size: 1.2rem; box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4); z-index: 100; border: 2px solid rgba(255,255,255,0.2); }
        .history-card { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow); max-height: 600px; overflow-y: auto; }
        .t-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; width: 450px; padding: 30px; border-radius: 24px; max-height: 90vh; overflow-y: auto; }
        
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #eee; cursor: pointer; font-weight: 800; transition: 0.3s; background: white; }
        .type-btn.active-inc { background: var(--success) !important; color: white !important; }
        .type-btn.active-exp { background: var(--danger) !important; color: white !important; }
        
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 10px; border: 2px solid #e2e8f0; font-family: inherit; box-sizing: border-box; }
        .btn-submit { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .alert-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 15px 30px; border-radius: 12px; font-weight: 800; display: none; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="alertBox" class="alert-toast">⚠️ לב לשים: עברת את 80% מהיעד החודשי!</div>

    <div class="sidebar">
        <h1>🏦 ProBank</h1>
        <button class="nav-btn" onclick="openModal('action')">➕ פעולה חדשה</button>
        <button class="nav-btn" onclick="openModal('goal')">🎯 הגדרת יעד</button>
        <button class="nav-btn" onclick="openModal('compare')">📊 השוואת חודשים</button>
        <button class="nav-btn" onclick="exportToExcel()">📥 ייצוא לאקסל (CSV)</button>
        
        <div class="archive-list" id="archiveList">
            <small style="opacity: 0.6;">ארכיון חודשים:</small>
        </div>
    </div>

    <div class="main">
        <div style="display: flex; flex-direction: column; gap: 25px;">
            <div class="stat-card">
                <h3>ניהול תקציב חודשי</h3>
                <div class="progress-container">
                    <div id="progressFill"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                    <span id="goalText">יעד: ₪0</span>
                    <span id="usedText">הוצאה חודשית: ₪0</span>
                </div>
            </div>
            <div class="stat-card">
                <h3>תזרים מזומנים (חודש זה)</h3>
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 25px;">
            <div class="stat-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="color: var(--success);"><small>הכנסות</small><div id="sumIn" style="font-weight: 800;">₪0</div></div>
                <div style="color: var(--danger);"><small>הוצאות</small><div id="sumOut" style="font-weight: 800;">₪0</div></div>
                <div style="color: var(--warning);"><small>מעשרות</small><div id="sumMa" style="font-weight: 800;">₪0</div></div>
                <div style="color: var(--accent); border-right: 2px solid #eee; padding-right: 10px;"><small>יתרה חודשית</small><div id="sumTotal" style="font-weight:800;">₪0</div></div>
            </div>
            <div class="history-card">
                <h3>פעולות חודש נוכחי</h3>
                <input type="text" id="searchInput" placeholder="חיפוש..." oninput="render()" style="margin-bottom: 10px;">
                <div id="logs"></div>
            </div>
        </div>
    </div>

    <div class="balance-float" id="floatBal">יתרה כללית: ₪0</div>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <h2 id="modalTitle">פעולה חדשה</h2>
            <div id="actionFields">
                <div class="type-selector">
                    <button id="btnExp" class="type-btn active-exp" onclick="setType('expense')">הוצאה</button>
                    <button id="btnInc" class="type-btn" onclick="setType('income')">הכנסה</button>
                </div>
                <input type="text" id="note" list="sugList" placeholder="* תיאור">
                <datalist id="sugList"></datalist>
                <input type="text" id="subCat" placeholder="תת קטגוריה">
                <input type="number" id="amt" placeholder="* סכום">
                <input type="date" id="dt">
                <div id="maaserBox" style="display:none; background:#f0fdf4; padding:10px; border-radius:10px; margin-bottom:15px;">
                    <label style="cursor:pointer;"><input type="checkbox" id="doM" checked> מעשר אוטומטי (10%)</label>
                </div>
            </div>
            <div id="goalFields" style="display:none"><input type="number" id="goalInput" placeholder="₪ יעד חודשי"></div>
            <div id="compareFields" style="display:none"><div id="compareContent"></div></div>
            <button class="btn-submit" onclick="finalSubmit()">אישור</button>
            <button style="background:none; border:none; color:#94a3b8; width:100%; cursor:pointer; margin-top:10px;" onclick="closeModal()">סגור</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem("pro_v94_db")) || [];
        let archives = JSON.parse(localStorage.getItem("pro_v94_archives")) || {};
        let myGoal = localStorage.getItem("pro_v94_goal") || 5000;
        let currentType = 'expense';
        let activeMode = 'action';

        const ctx = document.getElementById('lineChart').getContext('2d');
        let chart = new Chart(ctx, { 
            type: 'line', 
            data: { labels: [], datasets: [{ label: 'יתרה חודשית', data: [], borderColor: '#2563eb', tension: 0.3, fill: true, backgroundColor: 'rgba(37, 99, 235, 0.05)' }] },
            options: { scales: { y: { beginAtZero: true } } }
        });

        // פונקציית ארכיון חכמה - מפרידה חודשים ישנים
        function smartArchiveCheck() {
            const now = new Date();
            const currentMonthKey = `${now.getMonth() + 1}/${now.getFullYear()}`;
            let hasChanged = false;

            const oldItems = db.filter(item => {
                const itemDate = new Date(item.d);
                const itemMonthKey = `${itemDate.getMonth() + 1}/${itemDate.getFullYear()}`;
                return itemMonthKey !== currentMonthKey;
            });

            if (oldItems.length > 0) {
                oldItems.forEach(item => {
                    const itemDate = new Date(item.d);
                    const monthKey = `${itemDate.getMonth() + 1}/${itemDate.getFullYear()}`;
                    if (!archives[monthKey]) archives[monthKey] = [];
                    archives[monthKey].push(item);
                });

                db = db.filter(item => {
                    const itemDate = new Date(item.d);
                    const itemMonthKey = `${itemDate.getMonth() + 1}/${itemDate.getFullYear()}`;
                    return itemMonthKey === currentMonthKey;
                });
                hasChanged = true;
            }

            if (hasChanged) {
                localStorage.setItem("pro_v94_archives", JSON.stringify(archives));
                localStorage.setItem("pro_v94_db", JSON.stringify(db));
                renderArchiveSidebar();
            }
        }

        function setType(t) {
            currentType = t;
            resetFields();
            document.getElementById('btnExp').classList.toggle('active-exp', t==='expense');
            document.getElementById('btnInc').classList.toggle('active-inc', t==='income');
            document.getElementById('maaserBox').style.display = t==='income'?'block':'none';
            updateSugs();
        }

        function updateSugs() {
            const s = [...new Set(db.filter(i=>i.t===currentType).map(i=>i.n))];
            document.getElementById('sugList').innerHTML = s.map(n=>`<option value="${n}">`).join('');
        }

        function openModal(mode) {
            activeMode = mode;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('actionFields').style.display = mode==='action'?'block':'none';
            document.getElementById('goalFields').style.display = mode==='goal'?'block':'none';
            document.getElementById('compareFields').style.display = mode==='compare'?'block':'none';
            if(mode==='action') { resetFields(); document.getElementById('dt').valueAsDate = new Date(); }
            if(mode==='compare') renderCompare();
        }

        function resetFields() {
            document.getElementById('note').value = "";
            document.getElementById('amt').value = "";
            document.getElementById('subCat').value = "";
        }

        function closeModal() { document.getElementById('overlay').style.display = 'none'; resetFields(); }

        function finalSubmit() {
            if(activeMode === 'action') {
                const a = parseFloat(document.getElementById('amt').value), n = document.getElementById('note').value;
                if(!a || !n) return alert("שדות חובה!");
                db.push({ id: Date.now(), a, n, sc: document.getElementById('subCat').value, t: currentType, d: document.getElementById('dt').value });
                if(currentType==='income' && document.getElementById('doM').checked) {
                    db.push({ id: Date.now()+1, a: a*0.1, n: "מעשר", t: 'expense', m: true, d: document.getElementById('dt').value });
                }
            } else if(activeMode === 'goal') {
                myGoal = document.getElementById('goalInput').value;
                localStorage.setItem("pro_v94_goal", myGoal);
            }
            localStorage.setItem("pro_v94_db", JSON.stringify(db));
            smartArchiveCheck(); // בדיקה מיד לאחר שמירה
            closeModal(); render();
        }

        function renderArchiveSidebar() {
            const container = document.getElementById('archiveList');
            container.innerHTML = '<small style="opacity: 0.6;">ארכיון חודשים:</small>';
            Object.keys(archives).sort((a,b) => {
                const [m1,y1] = a.split('/'), [m2,y2] = b.split('/');
                return new Date(y2, m2-1) - new Date(y1, m1-1);
            }).forEach(key => {
                container.innerHTML += `<div class="archive-item"><span>📂 ${key}</span> <span onclick="deleteArchive('${key}', event)" style="cursor:pointer">🗑️</span></div>`;
            });
        }

        function deleteArchive(key, e) {
            e.stopPropagation();
            if(confirm(`למחוק את ארכיון ${key}?`)) {
                delete archives[key];
                localStorage.setItem("pro_v94_archives", JSON.stringify(archives));
                renderArchiveSidebar(); render();
            }
        }

        function renderCompare() {
            let html = '<table style="width:100%; text-align:right; border-collapse:collapse;"><tr><th>חודש</th><th>הכנסות</th><th>הוצאות</th><th>רווח</th></tr>';
            Object.keys(archives).forEach(m => {
                const inc = archives[m].filter(i=>i.t==='income').reduce((s,i)=>s+i.a,0);
                const exp = archives[m].filter(i=>i.t==='expense').reduce((s,i)=>s+i.a,0);
                html += `<tr style="border-bottom:1px solid #eee; height:40px;"><td>${m}</td><td style="color:var(--success)">₪${inc}</td><td style="color:var(--danger)">₪${exp}</td><td>₪${inc-exp}</td></tr>`;
            });
            document.getElementById('compareContent').innerHTML = html + '</table>';
        }

        function render() {
            const logs = document.getElementById('logs'), search = document.getElementById('searchInput').value.toLowerCase();
            logs.innerHTML = '';
            db.sort((a,b) => new Date(a.d) - new Date(b.d));
            let sIn=0, sOut=0, sMa=0, balCur=0, lbls=['0'], pts=[0];

            db.forEach(i => {
                const isInc = i.t === 'income';
                if(isInc) sIn += i.a; else { sOut += i.a; if(i.m) sMa += i.a; }
                balCur += (isInc ? i.a : -i.a);
                lbls.push(i.d.split('-')[2]); pts.push(balCur);

                if(!search || i.n.toLowerCase().includes(search)) {
                    logs.innerHTML = `<div class="t-item"><div><b>${i.n}</b><div style="font-size:0.7rem; color:#94a3b8">${i.d}</div></div><div style="text-align:left"><div style="color:${isInc?'var(--success)':'var(--danger)'}; font-weight:800">${isInc?'+':'-'}₪${i.a.toLocaleString()}</div><span onclick="del(${i.id})" style="cursor:pointer; opacity:0.2">🗑️</span></div></div>` + logs.innerHTML;
                }
            });

            let totalGlobal = balCur;
            Object.values(archives).forEach(m => m.forEach(i => totalGlobal += (i.t==='income'?i.a:-i.a)));

            document.getElementById('sumIn').innerText = `₪${sIn.toLocaleString()}`;
            document.getElementById('sumOut').innerText = `₪${sOut.toLocaleString()}`;
            document.getElementById('sumMa').innerText = `₪${sMa.toLocaleString()}`;
            document.getElementById('sumTotal').innerText = `₪${balCur.toLocaleString()}`;
            document.getElementById('floatBal').innerText = `יתרה כללית: ₪${totalGlobal.toLocaleString()}`;

            const perc = (sOut / myGoal) * 100;
            const fill = document.getElementById('progressFill');
            fill.style.width = Math.min(perc, 100) + "%";
            fill.style.background = perc <= 50 ? 'var(--success)' : (perc <= 80 ? 'var(--warning)' : 'var(--danger)');
            document.getElementById('alertBox').style.display = (perc >= 80) ? 'block' : 'none';
            
            document.getElementById('goalText').innerText = `יעד: ₪${parseFloat(myGoal).toLocaleString()}`;
            document.getElementById('usedText').innerText = `הוצאה חודשית: ₪${sOut.toLocaleString()}`;
            chart.data.labels = lbls; chart.data.datasets[0].data = pts; chart.update();
        }

        function del(id) { if(confirm("למחוק?")) { db = db.filter(i=>i.id!==id); localStorage.setItem("pro_v94_db", JSON.stringify(db)); render(); } }

        function exportToExcel() {
            let csv = "\uFEFFתאריך,תיאור,סוג,סכום\n";
            db.forEach(i => csv += `${i.d},${i.n},${i.t},${i.a}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob); link.download = "דוח_פרובנק.csv"; link.click();
        }

        smartArchiveCheck();
        renderArchiveSidebar();
        render();
    </script>
</body>
</html>
